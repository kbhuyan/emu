name: Go Build, Test, and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Opt into Node 24 for all jobs in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Run linters
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test with race detector
        run: go test -v -race ./...

